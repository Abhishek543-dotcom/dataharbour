services:
  # Backend API service
  backend:
    build: ./backend
    ports:
      - "8000:8000"  # FastAPI backend
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/notebooks:/data/notebooks
    environment:
      - DATABASE_URL=postgresql://admin:admin@postgres:5432/dataharbour
      - JWT_SECRET_KEY=09d25e094faa6ca2556c818166b7a9563b93f7099f6f0f4caa6cf63b88e8d3e7
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - ENABLE_AUTH=true
      - ENABLE_REGISTRATION=true
      - SPARK_MASTER_URL=spark://spark:7077
      - SPARK_UI_URL=http://spark:4040
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=dataharbour
      - ENVIRONMENT=development
    depends_on:
      - spark
      - postgres
    networks:
      - dataharbour-network

  # React Frontend (Production build)
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - dataharbour-network

  # Spark service - using Jupyter PySpark notebook which includes Spark
  spark:
    image: jupyter/pyspark-notebook:latest
    ports:
      - "4040:4040"  # Spark UI port
      - "7077:7077"  # Spark Master port
      - "8080:8080"  # Spark Master Web UI
      - "8889:8888"  # Jupyter port (different from main jupyter service)
    environment:
      - JUPYTER_ENABLE_LAB=yes
    command: start.sh spark-master
    volumes:
      - ./data/spark:/home/jovyan/work
    depends_on:
      - postgres
      - minio
    networks:
      - dataharbour-network

  # PostgreSQL database service
  postgres:
    image: postgres:13
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=dataharbour
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d dataharbour"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dataharbour-network

networks:
  dataharbour-network:
    driver: bridge

volumes:
  postgres-data:
  notebook-data:
